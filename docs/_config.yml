title: M3C Tools
description: Multi-Modal-Memory-Capturing Tools — macOS CLI & menu bar app
baseurl: /m3c-tools
url: https://kamir.github.io
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

# Navigation
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started
  - title: Menu Bar App
    url: /menubar-app
  - title: Audio Import
    url: /audio-import-tracking
  - title: Roadmap
    url: /roadmap

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

exclude:
  - seed-observation-window.yaml
  - ui-mockup.html
  - go-rewrite-plan.md
  - recording-window-requirements.md
  - requirements-er1-integration.md
  - feature-er1-login.md
