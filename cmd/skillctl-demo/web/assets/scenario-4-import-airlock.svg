<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b8860b"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <rect width="960" height="600" fill="none" stroke="#d0d7de" stroke-width="2"/>

  <!-- header -->
  <rect x="0" y="0" width="960" height="86" fill="#b8860b"/>
  <circle cx="46" cy="43" r="24" fill="#ffffff" opacity="0.18"/>
  <text x="46" y="52" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="88" y="38" font-size="24" font-weight="700" fill="#ffffff">Untrusted internet import goes through an airlock</text>
  <text x="88" y="66" font-size="15" fill="#ffffff" opacity="0.92">The internet is untrusted by default — import is an airlock, not a fast-path</text>
  <rect x="726" y="26" width="60" height="26" rx="13" fill="#ffffff" opacity="0.22"/>
  <text x="756" y="44" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">G3</text>
  <rect x="794" y="26" width="140" height="26" rx="13" fill="#9a6700"/>
  <text x="864" y="44" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">◑ PARTIAL (SPEC-0201)</text>

  <!-- threat -->
  <text x="40" y="122" font-size="14" font-weight="700" fill="#e5484d" letter-spacing="1">THREAT</text>
  <rect x="40" y="132" width="884" height="46" rx="9" fill="#fdece9" stroke="#e5484d" stroke-width="1.5"/>
  <text x="60" y="160" font-size="15" fill="#24292f">A developer wants a slick skill from <tspan font-weight="700">skillhub.club</tspan> or a <tspan font-weight="700">GitHub gist</tspan>. On every other platform: install &amp; run.</text>

  <!-- airlock pipeline -->
  <text x="40" y="212" font-size="14" font-weight="700" fill="#b8860b" letter-spacing="1">skillctl import-public &lt;url&gt; — THE AIRLOCK</text>

  <g font-size="12.5" fill="#24292f">
    <rect x="40" y="226" width="150" height="86" rx="10" fill="#fffbea" stroke="#d9a441" stroke-width="1.6"/>
    <text x="115" y="252" font-size="13.5" font-weight="700" fill="#9a6700" text-anchor="middle">1 · SHA-pin</text>
    <text x="115" y="276" text-anchor="middle">fetched by</text>
    <text x="115" y="293" text-anchor="middle">content-pinned</text>
    <text x="115" y="308" text-anchor="middle" font-weight="600">sha256</text>

    <line x1="190" y1="269" x2="214" y2="269" stroke="#b8860b" stroke-width="2.5" marker-end="url(#arw)"/>

    <rect x="216" y="226" width="160" height="86" rx="10" fill="#fffbea" stroke="#d9a441" stroke-width="1.6"/>
    <text x="296" y="252" font-size="13.5" font-weight="700" fill="#9a6700" text-anchor="middle">2 · Staged OUTSIDE</text>
    <text x="296" y="276" text-anchor="middle">never lands in</text>
    <text x="296" y="293" text-anchor="middle" font-weight="600">~/.claude/skills/</text>
    <text x="296" y="308" text-anchor="middle">— cannot run</text>

    <line x1="376" y1="269" x2="400" y2="269" stroke="#b8860b" stroke-width="2.5" marker-end="url(#arw)"/>

    <rect x="402" y="226" width="160" height="86" rx="10" fill="#fffbea" stroke="#d9a441" stroke-width="1.6"/>
    <text x="482" y="252" font-size="13.5" font-weight="700" fill="#9a6700" text-anchor="middle">3 · Static scan</text>
    <text x="482" y="276" text-anchor="middle">rules R-101…R-301</text>
    <text x="482" y="293" text-anchor="middle">flag egress /</text>
    <text x="482" y="308" text-anchor="middle">secrets / subprocess</text>

    <line x1="562" y1="269" x2="586" y2="269" stroke="#b8860b" stroke-width="2.5" marker-end="url(#arw)"/>

    <rect x="588" y="226" width="150" height="86" rx="10" fill="#fffbea" stroke="#d9a441" stroke-width="1.6"/>
    <text x="663" y="252" font-size="13.5" font-weight="700" fill="#9a6700" text-anchor="middle">4 · Yellow-cap</text>
    <text x="663" y="276" text-anchor="middle">capped, routed to</text>
    <text x="663" y="293" text-anchor="middle">the attestation-</text>
    <text x="663" y="308" text-anchor="middle">proposal queue</text>

    <line x1="738" y1="269" x2="762" y2="269" stroke="#b8860b" stroke-width="2.5" marker-end="url(#arw)"/>

    <rect x="764" y="226" width="160" height="86" rx="10" fill="#eafaf0" stroke="#2ea043" stroke-width="2"/>
    <text x="844" y="252" font-size="13.5" font-weight="700" fill="#1a7f37" text-anchor="middle">5 · HUMAN attest</text>
    <text x="844" y="276" text-anchor="middle" fill="#24292f">cannot run until a</text>
    <text x="844" y="293" text-anchor="middle" fill="#24292f">person reviews +</text>
    <text x="844" y="308" text-anchor="middle" fill="#24292f" font-weight="600">signs off</text>
  </g>

  <rect x="40" y="330" width="884" height="40" rx="9" fill="#eef7ff" stroke="#1f6feb" stroke-width="1.3"/>
  <text x="60" y="355" font-size="13.5" fill="#24292f">A critical-rule hit → <tspan font-weight="700" fill="#b62324">refused (exit 1)</tspan>. Otherwise it stays quarantined at yellow until a human attests.</text>

  <!-- without -->
  <rect x="40" y="392" width="884" height="150" rx="12" fill="#fff5f5" stroke="#e5484d" stroke-width="1.5"/>
  <text x="60" y="422" font-size="14" font-weight="700" fill="#e5484d" letter-spacing="1">⚠  WITHOUT skillctl</text>
  <rect x="60" y="436" width="300" height="46" rx="9" fill="#ffffff" stroke="#e5484d" stroke-width="1.3"/>
  <text x="78" y="464" font-size="14" fill="#24292f">npx &lt;skill&gt;   ·   pip install &lt;skill&gt;</text>
  <text x="392" y="464" font-size="14.5" font-weight="600" fill="#b62324">runs arbitrary install-time code immediately</text>
  <text x="60" y="512" font-size="13.5" fill="#57606a">The line: the public-hub fast-path is exactly the bypass — skillctl replaces it with an airlock a human must clear.</text>

  <text x="924" y="576" font-size="11" fill="#8c959f" text-anchor="end">m3c skill-trust · SPEC-0201 import airlock · KuP demo scenario 4</text>
</svg>
