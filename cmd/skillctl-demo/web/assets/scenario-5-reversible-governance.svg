<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2ea043"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <rect width="960" height="600" fill="none" stroke="#d0d7de" stroke-width="2"/>

  <!-- header -->
  <rect x="0" y="0" width="960" height="86" fill="#2ea043"/>
  <circle cx="46" cy="43" r="24" fill="#ffffff" opacity="0.18"/>
  <text x="46" y="52" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="88" y="38" font-size="24" font-weight="700" fill="#ffffff">Governance actions are reversible — and cannot be forced</text>
  <text x="88" y="66" font-size="15" fill="#ffffff" opacity="0.92">Even our kill-switch has a safety and an undo</text>
  <rect x="726" y="26" width="60" height="26" rx="13" fill="#ffffff" opacity="0.22"/>
  <text x="756" y="44" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">G7</text>
  <rect x="794" y="26" width="140" height="26" rx="13" fill="#146c2e"/>
  <text x="864" y="44" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">✓ BUILT (G-23)</text>

  <!-- threat -->
  <text x="40" y="122" font-size="14" font-weight="700" fill="#e5484d" letter-spacing="1">THREAT</text>
  <rect x="40" y="132" width="884" height="46" rx="9" fill="#fdece9" stroke="#e5484d" stroke-width="1.5"/>
  <text x="60" y="160" font-size="14.5" fill="#24292f">A destructive governance op (audit --cleanup, awareness reset, an over-broad revoke) is weaponized or fat-fingered.</text>

  <!-- two-step -->
  <text x="40" y="212" font-size="14" font-weight="700" fill="#2ea043" letter-spacing="1">THE G-23 TWO-STEP</text>

  <!-- step 1 -->
  <rect x="40" y="224" width="360" height="150" rx="12" fill="#eafaf0" stroke="#2ea043" stroke-width="2"/>
  <circle cx="66" cy="250" r="14" fill="#146c2e"/><text x="66" y="255" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="88" y="255" font-size="15" font-weight="700" fill="#146c2e">--dry-run-cleanup</text>
  <text x="60" y="284" font-size="13.5" fill="#24292f">Prints a REVIEWABLE plan: what, how</text>
  <text x="60" y="303" font-size="13.5" fill="#24292f">many, against which paths.</text>
  <rect x="60" y="318" width="320" height="42" rx="8" fill="#ffffff" stroke="#2ea043" stroke-width="1.4"/>
  <text x="74" y="338" font-size="12.5" fill="#24292f">emits a signed token</text>
  <text x="74" y="354" font-size="12.5" fill="#57606a">HMAC over the affected set · 5-min TTL</text>

  <line x1="400" y1="299" x2="452" y2="299" stroke="#2ea043" stroke-width="3" marker-end="url(#arw)"/>

  <!-- step 2 -->
  <rect x="456" y="224" width="468" height="150" rx="12" fill="#eafaf0" stroke="#2ea043" stroke-width="2"/>
  <circle cx="482" cy="250" r="14" fill="#146c2e"/><text x="482" y="255" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="504" y="255" font-size="15" font-weight="700" fill="#146c2e">--confirm-cleanup --token &lt;sig&gt;</text>
  <text x="476" y="284" font-size="13.5" fill="#24292f">Re-runs the affected-set query, verifies the HMAC</text>
  <text x="476" y="303" font-size="13.5" fill="#24292f">against the LIVE set.</text>
  <rect x="476" y="316" width="215" height="44" rx="8" fill="#fff5f5" stroke="#e5484d" stroke-width="1.4"/>
  <text x="490" y="336" font-size="12.5" fill="#24292f">either set drifted →</text>
  <text x="490" y="353" font-size="13" font-weight="700" fill="#b62324">REFUSE · exit 2</text>
  <rect x="702" y="316" width="200" height="44" rx="8" fill="#ffffff" stroke="#2ea043" stroke-width="1.4"/>
  <text x="716" y="336" font-size="12.5" fill="#24292f">match → act.</text>
  <text x="716" y="353" font-size="12.5" font-weight="600" fill="#146c2e">both rows audited</text>

  <!-- no force + reversible -->
  <rect x="40" y="388" width="430" height="72" rx="10" fill="#f6f8fa" stroke="#57606a" stroke-width="1.4"/>
  <text x="60" y="414" font-size="14" font-weight="700" fill="#24292f">🚫  NO --force bypass</text>
  <text x="60" y="437" font-size="12.5" fill="#57606a">a one-shot script still writes BOTH audit rows —</text>
  <text x="60" y="453" font-size="12.5" fill="#57606a">the two-step is never invisible</text>

  <rect x="494" y="388" width="430" height="72" rx="10" fill="#eef7ff" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="514" y="414" font-size="14" font-weight="700" fill="#0a3069">↩  Reversible</text>
  <text x="514" y="437" font-size="12.5" fill="#24292f">a bad revocation is rolled back by publishing a</text>
  <text x="514" y="453" font-size="12.5" fill="#24292f">higher-epoch HEAD without the digest — auditable</text>

  <!-- without -->
  <rect x="40" y="476" width="884" height="66" rx="12" fill="#fff5f5" stroke="#e5484d" stroke-width="1.5"/>
  <text x="60" y="502" font-size="14" font-weight="700" fill="#e5484d" letter-spacing="1">⚠  WITHOUT skillctl</text>
  <text x="60" y="526" font-size="14" fill="#24292f">A one-shot <tspan font-weight="600" fill="#b62324">--force delete</tspan> — no plan, no audit trail, no undo. A trust system whose own ops are one-shot is not trustworthy.</text>

  <text x="924" y="576" font-size="11" fill="#8c959f" text-anchor="end">m3c skill-trust · G-23 two-step (SPEC-0188 §11b) · SPEC-0279 rollback · KuP demo scenario 5</text>
</svg>
