name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Vet
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install PortAudio
        run: brew install portaudio

      - name: Go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run --timeout=5m

  test:
    name: Unit Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install PortAudio
        run: brew install portaudio

      - name: Run unit tests
        run: go test -v -count=1 ./e2e/ -run "TestComposite|TestBuild|TestParseTagLine|TestER1Config|TestER1Queue|TestER1EnqueueFailure|TestUploadFailure|TestRecorderEncodeWAV|TestRecorderStats|TestExportsDB|TestFilesDB|TestHashFile|TestFormatterLoader|TestPrettyPrint|TestFormatTranscript|TestFormatSnippet|TestFormatKeyValue|TestFormatTable|TestFormatSection|TestFormatStatusLine|TestBuildApp|TestTranslateFlagParsing|TestTranslateNotTranslatable|TestTranslateTranslatable|TestRetryQueue|TestRetryBackoffTiming|TestRetryBackoffCustomBase|TestRetryProcessingOrder|TestRetryPartialFailure|TestRetryMaxRetriesDropsEntry|TestRetryDropCallback|TestRetryRespectsBackoffDelay|TestRetryProcessesAfterBackoffElapsed|TestRetryGracefulShutdownOnCancel|TestRetryRunStopsOnContextCancel|TestRetryRunProcessesMultipleCycles|TestRetryEmptyQueue|TestRetryOnRetryCallback|TestTranscriptFilter|TestProxy|TestRetryRunner|TestBackgroundRetry|TestTranscriptImport|TestTranscriptList|TestTranscriptExport|TestMenubarIntegration|TestAppBundle|TestScheduleCommand|TestStatusCommand|TestCancelCommand|TestScheduleStatusCancelWorkflow|TestCLI|TestRepoRoot|TestWriteFixture|TestFixtureDir|TestTempDataDir|TestWithEnv|TestRunCLIWithEnv|TestScreenshot|TestImporter"

  build-macos:
    name: Build macOS (arm64 + amd64)
    runs-on: macos-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build universal PortAudio
        run: bash scripts/build-portaudio-universal.sh

      - name: Build darwin/arm64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -o build/m3c-tools-darwin-arm64 ./cmd/m3c-tools

      - name: Build darwin/amd64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-I$(pwd)/lib/portaudio" \
            CGO_LDFLAGS="-L$(pwd)/lib/portaudio -framework CoreAudio -framework AudioToolbox -framework AudioUnit -framework CoreFoundation -framework CoreServices" \
            go build -o build/m3c-tools-darwin-amd64 ./cmd/m3c-tools

      - name: Verify binaries
        run: |
          file build/m3c-tools-darwin-arm64
          file build/m3c-tools-darwin-amd64

      - name: Build POCs
        run: |
          go build -o build/poc-transcript ./cmd/poc-transcript
          go build -o build/poc-menubar ./cmd/poc-menubar
          go build -o build/poc-whisper ./cmd/poc-whisper
          go build -o build/poc-recorder ./cmd/poc-recorder

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m3c-tools-macos
          path: |
            build/m3c-tools-darwin-arm64
            build/m3c-tools-darwin-amd64

  build-cross:
    name: Build Cross-Platform (Linux + Windows)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o build/m3c-tools-linux-amd64 ./cmd/m3c-tools

      - name: Build windows/amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -o build/m3c-tools-windows-amd64.exe ./cmd/m3c-tools

      - name: Verify Linux binary
        run: |
          file build/m3c-tools-linux-amd64
          build/m3c-tools-linux-amd64 help

      - name: Upload cross-platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m3c-tools-cross
          path: |
            build/m3c-tools-linux-amd64
            build/m3c-tools-windows-amd64.exe
