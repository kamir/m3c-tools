name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Vet
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Install PortAudio
        run: brew install portaudio

      - name: Go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run --timeout=5m

  test:
    name: Unit Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Install PortAudio
        run: brew install portaudio

      # SPEC-0176 §3.1: every package under ./pkg/ now gates the build.
      # Race detector catches concurrency bugs in the retry queue, the
      # background scheduler, and the new pocket cloud-sync goroutines.
      - name: Run unit tests (./pkg/...)
        run: go test -race -count=1 ./pkg/...

      - name: Run e2e tests (allow-list)
        run: go test -v -count=1 ./e2e/ -run "TestComposite|TestBuild|TestParseTagLine|TestER1Config|TestER1Queue|TestER1EnqueueFailure|TestUploadFailure|TestRecorderEncodeWAV|TestRecorderStats|TestExportsDB|TestFilesDB|TestHashFile|TestFormatterLoader|TestPrettyPrint|TestFormatTranscript|TestFormatSnippet|TestFormatKeyValue|TestFormatTable|TestFormatSection|TestFormatStatusLine|TestTranslateFlagParsing|TestTranslateNotTranslatable|TestTranslateTranslatable|TestRetryQueue|TestRetryBackoffTiming|TestRetryBackoffCustomBase|TestRetryProcessingOrder|TestRetryPartialFailure|TestRetryMaxRetriesDropsEntry|TestRetryDropCallback|TestRetryRespectsBackoffDelay|TestRetryProcessesAfterBackoffElapsed|TestRetryGracefulShutdownOnCancel|TestRetryRunStopsOnContextCancel|TestRetryRunProcessesMultipleCycles|TestRetryEmptyQueue|TestRetryOnRetryCallback|TestTranscriptFilter|TestProxy|TestRetryRunner|TestBackgroundRetry|TestTranscriptImport|TestTranscriptList|TestTranscriptExport|TestScheduleCommand|TestStatusCommand|TestCancelCommand|TestScheduleStatusCancelWorkflow|TestCLI|TestRepoRoot|TestWriteFixture|TestFixtureDir|TestTempDataDir|TestWithEnv|TestRunCLIWithEnv|TestImporter"

  skillctl-race:
    name: skillctl Security Tests (-race)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Install PortAudio
        run: brew install portaudio

      # SPEC-0251 (P1, LOT D-ci): the skillctl trust layer is the highest-value
      # security surface (install verification, signing/revocation, two-step
      # install tokens) and also the largest concurrency surface (install-token
      # HMAC key persistence, run/awareness state). The general unit-test job
      # already runs ./pkg/... under -race, but ./cmd/skillctl/... — where the
      # security-critical command wiring and e2e install tests live — was never
      # exercised with the race detector. Run both explicitly, green-or-fail.
      - name: Run skillctl security tests (-race)
        run: go test -race -count=1 ./cmd/skillctl/... ./pkg/skillctl/...

  # SPEC-0251 §5 supply-chain hygiene ─────────────────────────────────────────
  govulncheck:
    name: govulncheck (reachable CVEs)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      # The cgo packages (recorder/menubar) need PortAudio to typecheck, so run
      # on macOS like the other jobs rather than a pure-Go ubuntu runner.
      - name: Install PortAudio
        run: brew install portaudio

      # govulncheck fails ONLY on vulns reachable from our code. The toolchain is
      # pinned to a patched Go (go1.26.4, via go.mod `toolchain` + setup-go) so the
      # stdlib CVEs older toolchains carried are gone; this job keeps them from
      # regressing. Standalone (not in any build job's `needs`) so a fresh upstream
      # CVE blocks merge but never the release builds.
      - name: govulncheck ./...
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for a complete secret scan

      # .gitleaks.toml already drives the local pre-commit hook, but the hook is
      # opt-in per clone. Enforce it in CI over full history. Pinned to the same
      # gitleaks version validated locally; exits non-zero on any finding (blocks).
      - name: Install gitleaks
        run: |
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan full history (config-aware)
        run: gitleaks git . --config .gitleaks.toml --no-banner --redact

  build-macos:
    name: Build macOS (arm64 + amd64)
    runs-on: macos-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Install PortAudio (Homebrew, for native arm64 build)
        run: brew install portaudio pkg-config

      - name: Build universal PortAudio (for amd64 cross-compile)
        run: bash scripts/build-portaudio-universal.sh

      - name: Build darwin/arm64 (native)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -o build/m3c-tools-darwin-arm64 ./cmd/m3c-tools

      - name: Build darwin/amd64 (cross-compile with universal PortAudio)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-I$(pwd)/lib/portaudio" \
            CGO_LDFLAGS="-L$(pwd)/lib/portaudio -framework CoreAudio -framework AudioToolbox -framework AudioUnit -framework CoreFoundation -framework CoreServices" \
            go build -o build/m3c-tools-darwin-amd64 ./cmd/m3c-tools

      - name: Verify binaries
        run: |
          file build/m3c-tools-darwin-arm64
          file build/m3c-tools-darwin-amd64

      - name: Build POCs
        run: |
          go build -o build/poc-transcript ./cmd/poc-transcript
          go build -o build/poc-menubar ./cmd/poc-menubar
          go build -o build/poc-whisper ./cmd/poc-whisper
          go build -o build/poc-recorder ./cmd/poc-recorder

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m3c-tools-macos
          path: |
            build/m3c-tools-darwin-arm64
            build/m3c-tools-darwin-amd64

  build-cross:
    name: Build Cross-Platform (Linux + Windows)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o build/m3c-tools-linux-amd64 ./cmd/m3c-tools

      - name: Build windows/amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -o build/m3c-tools-windows-amd64.exe ./cmd/m3c-tools

      - name: Verify Linux binary
        run: |
          file build/m3c-tools-linux-amd64
          build/m3c-tools-linux-amd64 help

      - name: Upload cross-platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m3c-tools-cross
          path: |
            build/m3c-tools-linux-amd64
            build/m3c-tools-windows-amd64.exe
