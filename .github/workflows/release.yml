name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64 + amd64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install PortAudio (Homebrew, for native arm64 build)
        run: brew install portaudio pkg-config

      - name: Build universal PortAudio (for amd64 cross-compile)
        run: bash scripts/build-portaudio-universal.sh

      - name: Build darwin/arm64 (native)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w" -o m3c-tools-darwin-arm64 ./cmd/m3c-tools

      - name: Build darwin/amd64 (cross-compile with universal PortAudio)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-I$(pwd)/lib/portaudio" \
            CGO_LDFLAGS="-L$(pwd)/lib/portaudio -framework CoreAudio -framework AudioToolbox -framework AudioUnit -framework CoreFoundation -framework CoreServices" \
            go build -ldflags="-s -w" -o m3c-tools-darwin-amd64 ./cmd/m3c-tools

      - name: Package macOS binaries
        run: |
          tar czf m3c-tools-darwin-arm64.tar.gz m3c-tools-darwin-arm64
          tar czf m3c-tools-darwin-amd64.tar.gz m3c-tools-darwin-amd64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            m3c-tools-darwin-arm64.tar.gz
            m3c-tools-darwin-amd64.tar.gz

  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o m3c-tools-linux-amd64 ./cmd/m3c-tools

      - name: Package Linux binary
        run: tar czf m3c-tools-linux-amd64.tar.gz m3c-tools-linux-amd64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: m3c-tools-linux-amd64.tar.gz

  build-windows:
    name: Build Windows (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build windows/amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w" -o m3c-tools-windows-amd64.exe ./cmd/m3c-tools

      - name: Package Windows binary
        run: zip m3c-tools-windows-amd64.zip m3c-tools-windows-amd64.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: m3c-tools-windows-amd64.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/m3c-tools-darwin-arm64.tar.gz
            artifacts/m3c-tools-darwin-amd64.tar.gz
            artifacts/m3c-tools-linux-amd64.tar.gz
            artifacts/m3c-tools-windows-amd64.zip
