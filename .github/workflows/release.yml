name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  # -----------------------------------------------------------------------
  # macOS: m3c-tools (CGO_ENABLED=1, needs portaudio) + skillctl
  # -----------------------------------------------------------------------
  build-macos:
    name: Build macOS (arm64 + amd64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install PortAudio (Homebrew, for native arm64 build)
        run: brew install portaudio pkg-config

      - name: Build universal PortAudio (for amd64 cross-compile)
        run: bash scripts/build-portaudio-universal.sh

      # --- m3c-tools darwin/arm64 (native CGO) ---
      - name: Build m3c-tools darwin/arm64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build \
              -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
              -o m3c-tools-darwin-arm64 ./cmd/m3c-tools

      # --- m3c-tools darwin/amd64 (cross-compile with universal PortAudio) ---
      - name: Build m3c-tools darwin/amd64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-I$(pwd)/lib/portaudio" \
            CGO_LDFLAGS="-L$(pwd)/lib/portaudio -framework CoreAudio -framework AudioToolbox -framework AudioUnit -framework CoreFoundation -framework CoreServices" \
            go build \
              -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
              -o m3c-tools-darwin-amd64 ./cmd/m3c-tools

      # --- skillctl darwin (pure Go, no CGO) ---
      - name: Build skillctl darwin/arm64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build \
              -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
              -o skillctl-darwin-arm64 ./cmd/skillctl

      - name: Build skillctl darwin/amd64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build \
              -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
              -o skillctl-darwin-amd64 ./cmd/skillctl

      # --- Package ---
      - name: Package macOS binaries
        run: |
          tar czf m3c-tools-darwin-arm64.tar.gz m3c-tools-darwin-arm64
          tar czf m3c-tools-darwin-amd64.tar.gz m3c-tools-darwin-amd64
          tar czf skillctl-darwin-arm64.tar.gz skillctl-darwin-arm64
          tar czf skillctl-darwin-amd64.tar.gz skillctl-darwin-amd64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            m3c-tools-darwin-arm64.tar.gz
            m3c-tools-darwin-amd64.tar.gz
            skillctl-darwin-arm64.tar.gz
            skillctl-darwin-amd64.tar.gz

  # -----------------------------------------------------------------------
  # Linux + Windows: m3c-tools (CGO_ENABLED=0) + skillctl via GoReleaser
  # -----------------------------------------------------------------------
  build-linux-windows:
    name: Build Linux + Windows (GoReleaser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
          version: "~> v2"

      - name: Run GoReleaser (snapshot, no publish)
        run: goreleaser release --skip=publish --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GoReleaser artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-binaries
          path: |
            dist/m3c-tools-linux-*.tar.gz
            dist/skillctl-linux-*.tar.gz
            dist/m3c-tools-windows-*.zip
            dist/skillctl-windows-*.zip

  # -----------------------------------------------------------------------
  # Windows NSIS installer
  # -----------------------------------------------------------------------
  build-windows-installer:
    name: Build Windows Installer (NSIS)
    runs-on: ubuntu-latest
    needs: [build-linux-windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis

      - name: Cross-compile Windows binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          mkdir -p build/windows
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="${LDFLAGS}" -o build/windows/m3c-tools.exe ./cmd/m3c-tools
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="${LDFLAGS}" -o build/windows/skillctl.exe ./cmd/skillctl
          cp design/icons/menubar-icon.png build/windows/

      - name: Build NSIS installer
        run: makensis scripts/installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/M3C-Tools-Setup.exe

  # -----------------------------------------------------------------------
  # Release: merge all artifacts, generate checksums, create GitHub Release
  # -----------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux-windows, build-windows-installer]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip *.exe > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/m3c-tools-darwin-arm64.tar.gz
            artifacts/m3c-tools-darwin-amd64.tar.gz
            artifacts/m3c-tools-linux-amd64.tar.gz
            artifacts/m3c-tools-linux-arm64.tar.gz
            artifacts/m3c-tools-windows-amd64.zip
            artifacts/skillctl-darwin-arm64.tar.gz
            artifacts/skillctl-darwin-amd64.tar.gz
            artifacts/skillctl-linux-amd64.tar.gz
            artifacts/skillctl-linux-arm64.tar.gz
            artifacts/skillctl-windows-amd64.zip
            artifacts/M3C-Tools-Setup.exe
            artifacts/checksums.txt
