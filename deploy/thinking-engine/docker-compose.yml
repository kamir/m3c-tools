# docker-compose.yml — Phase 1 (dev/local) Thinking Engine stack.
#
# SPEC-0167 §Deployment Topology §Phase 1:
#   - cp-all-in-one (broker, zookeeper, schema-registry, control-center)
#   - engine container
#   - single broker, RF=1 (D5)
#
# All ports are parameterized so multiple users' stacks can coexist
# on one machine — run with per-user .env files keyed by ctx_hash.

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: "m3c-zookeeper-${CTX_HASH:?CTX_HASH required}"
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-log:/var/lib/zookeeper/log

  broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: "m3c-broker-${CTX_HASH:?CTX_HASH required}"
    depends_on:
      - zookeeper
    ports:
      - "${BROKER_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:${BROKER_PORT:-9092}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: "m3c-schema-registry-${CTX_HASH:?CTX_HASH required}"
    depends_on:
      - broker
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://broker:29092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.6.1
    container_name: "m3c-control-center-${CTX_HASH:?CTX_HASH required}"
    depends_on:
      - broker
      - schema-registry
    ports:
      - "${CONTROL_CENTER_PORT:-9021}:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: "broker:29092"
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021

  engine:
    # The engine image is built out-of-band from this compose file —
    # see the Makefile `thinking-build` target. For Week 1 we only
    # run the binary natively; the compose file includes a container
    # slot so Week 2+ can flip to container-runtime trivially.
    image: m3c/thinking-engine:${ENGINE_TAG:-dev}
    container_name: "m3c-engine-${CTX_HASH:?CTX_HASH required}"
    depends_on:
      - broker
    ports:
      - "${ENGINE_PORT:-7140}:7140"
    environment:
      THINKING_ENGINE_SECRET: "${THINKING_ENGINE_SECRET:?secret required}"
      M3C_USER_CONTEXT_ID: "${M3C_USER_CONTEXT_ID:?user_context_id required}"
      M3C_KAFKA_ADDR: "broker:29092"
    profiles:
      - engine # disabled by default until an image tag exists

volumes:
  zk-data:
  zk-log:
  kafka-data:
